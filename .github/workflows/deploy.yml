name: Hexo Deploy

on:
  push:
    branches:
      - src

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Deploy
        env:
          GH_TOKEN: ${{ secrets.HEXO_DEPLOY_PRI }} # 確認名稱與 Secret 一致
        run: |
          git config --global user.name "NishikinoPanda"
          git config --global user.email "panda.makioshi@gmail.com"
          # 這行會把 Token 置換進 URL 中進行驗證
          sed -i "s|https://github.com/|https://${GH_TOKEN}@github.com/|g" _config.yml
          npx hexo clean
          npx hexo deploy